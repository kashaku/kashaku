name: Waka Readme

on:
  # for manual workflow trigger
  workflow_dispatch:
  push:
  schedule:
    # runs at 12 AM UTC (5:30 AM IST)
    - cron: "0 8 * * *"

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master # this action name
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: all_time
          BLOCKS: ●○
          CODE_LANG: ruby
          LANG_COUNT: 6
          SHOW_TIME: true
          SHOW_TOTAL: true
